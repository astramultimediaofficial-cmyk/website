<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Astra Multimedia</title>
    <style>
        /* --- DYNAMIC ANIMATED BACKGROUND --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: #000;
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Nebula Layer */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(37, 99, 235, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(29, 78, 216, 0.15) 0%, transparent 50%);
            filter: blur(60px);
            z-index: -1;
            animation: movePlasma 15s ease-in-out infinite alternate;
        }

        /* Moving Grid / Starfield Effect */
        .bg-stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 100px 150px, #2563eb, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 200px 80px, #fff, rgba(0,0,0,0));
            background-size: 300px 300px;
            z-index: -1;
            opacity: 0.3;
            animation: drift 60s linear infinite;
        }

        @keyframes movePlasma {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.3) translate(5%, 5%); }
        }

        @keyframes drift {
            from { background-position: 0 0; }
            to { background-position: 1000px 1000px; }
        }

        /* --- FORM CONTAINER --- */
        .form-container {
            background: rgba(10, 10, 10, 0.8);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid rgba(37, 99, 235, 0.4);
            width: 90%;
            max-width: 420px;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 50px rgba(37, 99, 235, 0.2);
            animation: formEntrance 0.8s ease-out;
            position: relative;
            z-index: 10;
        }

        @keyframes formEntrance {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { 
            color: #fff; 
            margin-bottom: 5px; 
            text-align: center; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            font-size: 1.8rem;
        }

        .subtitle {
            text-align: center;
            color: #2563eb;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .input-group { margin-bottom: 18px; }
        
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 0.75rem; 
            color: #888; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, select {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 12px;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus { 
            border-color: #2563eb; 
            background: rgba(37, 99, 235, 0.05);
            box-shadow: 0 0 10px rgba(37, 99, 235, 0.2);
        }

        .btn-reg {
            width: 100%;
            padding: 16px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.4s;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }

        .btn-reg:hover { 
            background: #1d4ed8; 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5);
        }

        .back-link { 
            display: block; 
            text-align: center; 
            margin-top: 20px; 
            color: #666; 
            text-decoration: none; 
            font-size: 0.75rem; 
            transition: 0.3s;
        }
        .back-link:hover { color: #fff; }
    </style>
</head>
<body>

    <div class="bg-stars"></div>

    <div class="form-container">
        <h2>Join Astra</h2>
        <p class="subtitle">Secure Your Future In Tech</p>
        
        <form action="#">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your name" required>
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@company.com" required>
            </div>
            <div class="input-group">
                <label>Phone Number</label>
                <input type="tel" placeholder="+91" required>
            </div>
            <div class="input-group">
                <label>Target Course</label>
                <select id="courseSelect">
                    <option value="uiux">UI & UX Design</option>
                    <option value="graphic">Graphic Design</option>
                    <option value="vfx">VFX Production</option>
                    <option value="animation">2D & 3D Animation</option>
                    <option value="marketing">Digital Marketing</option>
                    <option value="webdev">Web Development</option>
                </select>
            </div>
            <button type="submit" class="btn-reg">Confirm Registration</button>
        </form>
        <a href="index.html" class="back-link">← Return to Course Catalog</a>
    </div>

    <script>
        // Smoothly select course from URL
        const urlParams = new URLSearchParams(window.location.search);
        const course = urlParams.get('course');
        if (course) {
            document.getElementById('courseSelect').value = course;
        }
    </script>
</body>
</html>
